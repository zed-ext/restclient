id = "restclient"
name = "REST Client"
description = "HTTP client for testing REST APIs with .http files"
version = "0.1.0"
schema_version = 1
authors = ["REST Client Contributors"]
repository = "https://github.com/tongzhou/zed-restclient"
languages = ["languages/http"]

[lib]
kind = "Rust"
version = "0.7.0"

[grammars.http]
repository = "https://github.com/rest-nvim/tree-sitter-http"
rev = "db8b4398de90b6d0b6c780aba96aaa2cd8e9202c"

[slash_commands.send]
description = "Execute an HTTP request from a .http file"
requires_argument = false

[slash_commands.http]
description = "Execute HTTP request - usage: /http <file> [request-number]"
requires_argument = true
