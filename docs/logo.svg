<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>

    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="140"/>
    </clipPath>
  </defs>

  <!-- Full dark background -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- HTTP methods and status codes in background - within circle -->
  <g clip-path="url(#circleClip)">
    <!-- HTTP Methods - more centered -->
    <text x="170" y="95" font-family="monospace" font-size="22" font-weight="bold" fill="#06B6D4" opacity="0.35" filter="url(#textBlur)">GET</text>
    <text x="95" y="210" font-family="monospace" font-size="22" font-weight="bold" fill="#06B6D4" opacity="0.35" filter="url(#textBlur)">POST</text>
    <text x="155" y="300" font-family="monospace" font-size="22" font-weight="bold" fill="#06B6D4" opacity="0.35" filter="url(#textBlur)">PATCH</text>
    <text x="240" y="200" font-family="monospace" font-size="20" font-weight="bold" fill="#06B6D4" opacity="0.35" filter="url(#textBlur)">OPTIONS</text>

    <!-- Status codes -->
    <text x="260" y="110" font-family="monospace" font-size="22" font-weight="bold" fill="#10B981" opacity="0.4" filter="url(#textBlur)">200</text>
    <text x="85" y="150" font-family="monospace" font-size="22" font-weight="bold" fill="#EF4444" opacity="0.4" filter="url(#textBlur)">404</text>
    <text x="265" y="265" font-family="monospace" font-size="22" font-weight="bold" fill="#10B981" opacity="0.4" filter="url(#textBlur)">201</text>
    <text x="100" y="265" font-family="monospace" font-size="22" font-weight="bold" fill="#F59E0B" opacity="0.4" filter="url(#textBlur)">401</text>
    <text x="240" y="290" font-family="monospace" font-size="22" font-weight="bold" fill="#EF4444" opacity="0.4" filter="url(#textBlur)">500</text>

    <!-- Protocol -->
    <text x="255" y="155" font-family="monospace" font-size="22" font-weight="bold" fill="#06B6D4" opacity="0.35" filter="url(#textBlur)">HTTPS</text>
  </g>

  <!-- Lightning bolt with braces -->
  <g clip-path="url(#circleClip)">
    <!-- Left curly brace { -->
    <path d="M 95 160
             L 85 165
             L 85 190
             L 75 195
             L 75 205
             L 85 210
             L 85 235
             L 95 240"
          stroke="#06B6D4"
          stroke-width="8"
          fill="none"
          opacity="0.7"
          filter="url(#glow)"/>

    <!-- Sharp Z-like lightning bolt -->
    <path d="M 250 130
             L 150 200
             L 185 200
             L 150 270
             L 250 200
             L 215 200
             Z"
          fill="#06B6D4"
          filter="url(#glow)"/>

    <!-- Right curly brace } -->
    <path d="M 305 160
             L 315 165
             L 315 190
             L 325 195
             L 325 205
             L 315 210
             L 315 235
             L 305 240"
          stroke="#06B6D4"
          stroke-width="8"
          fill="none"
          opacity="0.7"
          filter="url(#glow)"/>

    <!-- Highlight on Z top edge -->
    <path d="M 250 130
             L 150 200
             L 185 200
             L 175 210
             L 235 145
             Z"
          fill="#93C5FD"
          opacity="0.5"/>
  </g>

  <!-- Subtle ring accent -->
  <circle cx="200" cy="200" r="140"
          fill="none"
          stroke="#3B82F6"
          stroke-width="3"
          opacity="0.2"/>
</svg>
